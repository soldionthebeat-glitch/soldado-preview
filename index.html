<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SOLDADO - DROP</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  width: 90%;
  max-width: 400px;
}

h1 {
  color: red;
  font-size: 40px;
  letter-spacing: 4px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 5px;
  border: none;
}

input {
  background: #111;
  color: white;
  border: 1px solid red;
}

button {
  background: red;
  color: white;
  cursor: pointer;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="container">

<div id="login">
  <h1>SOLDADO</h1>
  <p id="remaining">Cargando...</p>

  <input id="code" placeholder="Código VIP">
  <button onclick="login()">Entrar</button>

  <p id="error"></p>
</div>

</div>

<script>
const API = "https://soldado-api.onrender.com";

// cargar accesos restantes
async function loadRemaining() {
  let res = await fetch(API + "/remaining");
  let data = await res.json();

  document.getElementById("remaining").innerText =
    data.remaining > 0
    ? "Quedan " + data.remaining + " accesos"
    : "Accesos agotados";
}

// login
async function login() {
  let code = document.getElementById("code").value;

  let res = await fetch(API + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ code })
  });

  let data = await res.json();

  if (data.success) {
    // ✅ recién acá entra
    window.location.href = "player.html";
  } else {
    document.getElementById("error").innerText =
      "Código inválido o ya usado";
  }

  loadRemaining();
}

loadRemaining();
</script>

</body>
</html>
